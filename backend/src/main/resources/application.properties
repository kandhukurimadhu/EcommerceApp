# =============================
# Application Configuration
# =============================
spring.application.name=ecommerce-app
server.port=${PORT:8080}
server.forward-headers-strategy=framework

# =============================
# MySQL Configuration (Production - Railway)
# =============================
spring.datasource.url=${MYSQL_URL}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =============================
# JPA / Hibernate
# =============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true

# =============================
# JWT Configuration
# =============================
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=86400000

# =============================
# OAuth2 / Google SSO Configuration
# =============================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri=https://ecommerceapp-production-3c77.up.railway.app/login/oauth2/code/google

# =============================
# CORS Configuration
# =============================
app.cors.allowed-origins=https://kind-victory-production.up.railway.app

# =============================
# Logging
# =============================
logging.level.com.busybrains=DEBUG
logging.level.org.springframework.security=INFO
