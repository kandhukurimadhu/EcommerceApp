# =============================
# Application Configuration
# =============================
spring.application.name=ecommerce-app
server.port=8080

# =============================
# Database Configuration
# Using H2 for development (switch to MySQL for production)
# =============================
spring.datasource.url=jdbc:h2:mem:ecommercedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# =============================
# MySQL Configuration (Uncomment for production)
# =============================
# spring.datasource.url=jdbc:mysql://localhost:3306/ecommercedb?useSSL=false&serverTimezone=UTC
# spring.datasource.username=root
# spring.datasource.password=your_password
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =============================
# JPA / Hibernate
# =============================
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
# For MySQL use: org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# =============================
# JWT Configuration
# =============================
app.jwt.secret=YOUR_JWT_SECRET
app.jwt.expiration=86400000

# =============================
# OAuth2 / Google SSO Configuration
# Replace YOUR_CLIENT_ID and YOUR_CLIENT_SECRET with actual Google OAuth credentials
# from: https://console.cloud.google.com/
# =============================
spring.security.oauth2.client.registration.google.client-id=YOUR_GOOGLE_CLIENT_ID
spring.security.oauth2.client.registration.google.client-secret=YOUR_GOOGLE_CLIENT_SECRET
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri=http://localhost:8080/login/oauth2/code/google

# =============================
# CORS Configuration
# =============================
app.cors.allowed-origins=http://localhost:3000

# =============================
# Logging
# =============================
logging.level.com.busybrains=DEBUG
logging.level.org.springframework.security=INFO
